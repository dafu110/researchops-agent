name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      STORE_BACKEND: json
      DATA_DIR: /tmp/researchops-agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Compile Python
        run: python -m compileall app tests scripts
      - name: Lint
        run: ruff check .
      - name: JavaScript syntax
        run: node --check app/static/app.js
      - name: Tests
        run: pytest -q
      - name: Eval gate
        run: python scripts/run_eval_gate.py

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Docker build
        run: docker build .
